<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Érettségi tételtárak</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #08090b;
      --muted: #4d5662;
      --line: #d8dde5;
      --page: #eef5f7;
      --surface: #ffffff;
      --shadow: 0 24px 70px rgba(30, 39, 55, 0.18);
      --soft-shadow: 0 10px 24px rgba(30, 39, 55, 0.1);
      --green: #2d8f83;
      --blue: #2d77a8;
      --red: #9d4b3e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      width: 100%;
    }

    body {
      background:
        radial-gradient(circle at 22% 12%, rgba(255, 255, 255, 0.88), transparent 28%),
        linear-gradient(180deg, #f8fbfc 0%, var(--page) 45%, #e9f2f4 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      padding: clamp(18px, 4vw, 48px);
    }

    .browser-window {
      background: var(--surface);
      border: 1px solid rgba(138, 150, 166, 0.38);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin: 0 auto;
      max-width: 1120px;
      min-height: calc(100vh - clamp(36px, 8vw, 96px));
      overflow: hidden;
    }

    .browser-top {
      align-items: center;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 18px;
      grid-template-columns: auto auto minmax(160px, 260px) 1fr auto;
      min-height: 54px;
      padding: 10px 18px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .window-dots {
      display: flex;
      gap: 7px;
    }

    .window-dot {
      border-radius: 999px;
      height: 11px;
      width: 11px;
    }

    .window-dot:nth-child(1) {
      background: #f36b5f;
    }

    .window-dot:nth-child(2) {
      background: #f2c351;
    }

    .window-dot:nth-child(3) {
      background: #52c46b;
    }

    .home-link {
      background: transparent;
      border: 0;
      border-radius: 7px;
      color: var(--ink);
      cursor: pointer;
      font-weight: 760;
      min-height: 34px;
      padding: 7px 10px;
    }

    .home-link:hover,
    .home-link:focus-visible {
      background: #f1f5f7;
      outline: none;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap::before {
      color: #8a95a3;
      content: "⌕";
      font-size: 1rem;
      left: 12px;
      line-height: 1;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    .search-input {
      background: #ffffff;
      border: 1px solid #cfd6df;
      border-radius: 7px;
      color: var(--ink);
      min-height: 34px;
      padding: 7px 10px 7px 32px;
      width: 100%;
    }

    .search-input:focus {
      border-color: #7fa9b5;
      box-shadow: 0 0 0 3px rgba(45, 143, 131, 0.16);
      outline: none;
    }

    .mini-menu {
      display: flex;
      gap: 8px;
      justify-self: end;
    }

    .mini-menu button {
      --tone: var(--green);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 760;
      min-height: 34px;
      padding: 7px 10px;
    }

    .mini-menu button:hover,
    .mini-menu button:focus-visible {
      border-color: var(--tone);
      outline: none;
    }

    .mini-menu button[aria-current="page"] {
      background: var(--tone);
      border-color: var(--tone);
      color: #ffffff;
    }

    .active-badge {
      align-items: center;
      background: #101827;
      border-radius: 7px;
      color: #ffffff;
      display: flex;
      font-size: 0.86rem;
      font-weight: 760;
      gap: 8px;
      min-height: 34px;
      padding: 7px 11px;
      white-space: nowrap;
    }

    .active-badge::before {
      background: #52c46b;
      border-radius: 999px;
      content: "";
      height: 8px;
      width: 8px;
    }

    .landing {
      display: block;
    }

    .hero {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.96), rgba(241, 248, 250, 0.9)),
        linear-gradient(135deg, rgba(45, 143, 131, 0.08), rgba(45, 119, 168, 0.06));
      border-bottom: 1px solid #e2e8ef;
      padding: clamp(42px, 7vw, 74px) clamp(34px, 7vw, 78px) clamp(38px, 5vw, 54px);
    }

    .hero h1 {
      font-size: clamp(2.7rem, 6vw, 5.1rem);
      letter-spacing: 0;
      line-height: 0.95;
      margin: 0 0 14px;
      max-width: 840px;
    }

    .hero p {
      color: #101827;
      font-size: clamp(1rem, 1.4vw, 1.18rem);
      line-height: 1.38;
      margin: 0;
      max-width: 650px;
    }

    .subject-grid {
      display: grid;
      gap: 22px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      padding: 34px clamp(34px, 5vw, 54px) 48px;
    }

    .subject-card {
      --tone: var(--green);
      --wash: #e5f5f1;
      background: var(--wash);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset;
      color: var(--ink);
      cursor: pointer;
      min-height: 286px;
      overflow: hidden;
      padding: 26px 22px 22px;
      position: relative;
      text-align: left;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 150ms ease;
    }

    .subject-card:hover,
    .subject-card:focus-visible {
      border-color: var(--tone);
      box-shadow: 0 0 0 4px rgba(45, 143, 131, 0.12), var(--soft-shadow);
      outline: none;
      transform: translateY(-2px);
    }

    .subject-art {
      align-items: center;
      display: flex;
      gap: 18px;
      min-height: 84px;
    }

    .subject-icon {
      color: var(--tone);
      filter: drop-shadow(0 2px 0 rgba(255, 255, 255, 0.8));
      height: 74px;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
      width: 74px;
    }

    .subject-card strong {
      display: block;
      font-size: clamp(1.8rem, 3vw, 2.45rem);
      letter-spacing: 0;
      line-height: 1;
      margin: 22px 0 10px;
    }

    .subject-card p {
      color: #121820;
      font-size: 1rem;
      font-weight: 520;
      line-height: 1.22;
      margin: 0 0 18px;
      max-width: 26ch;
    }

    .open-pill {
      background: var(--tone);
      border-radius: 7px;
      color: #ffffff;
      display: inline-flex;
      font-size: 0.93rem;
      font-weight: 760;
      min-height: 38px;
      padding: 9px 15px;
    }

    .empty-state {
      color: var(--muted);
      display: none;
      font-weight: 700;
      grid-column: 1 / -1;
      padding: 18px 0;
    }

    .frame-wrap {
      display: none;
      padding: 0;
    }

    .site-frame {
      background: #ffffff;
      border: 0;
      display: block;
      height: calc(100vh - 76px);
      min-height: 680px;
      width: 100%;
    }

    .frame-title {
      height: 1px;
      left: -999px;
      overflow: hidden;
      position: absolute;
      width: 1px;
    }

    .is-viewing .browser-window {
      max-width: none;
      min-height: calc(100vh - 24px);
    }

    .is-viewing.app-shell {
      padding: 12px;
    }

    .is-viewing .browser-top {
      grid-template-columns: auto auto minmax(140px, 240px) 1fr auto;
      min-height: 48px;
      padding-bottom: 7px;
      padding-top: 7px;
    }

    .is-viewing .landing {
      display: none;
    }

    .is-viewing .frame-wrap {
      display: block;
    }

    @media (max-width: 880px) {
      .app-shell {
        padding: 10px;
      }

      .browser-top,
      .is-viewing .browser-top {
        grid-template-columns: auto 1fr;
      }

      .window-dots,
      .active-badge {
        display: none;
      }

      .search-wrap {
        grid-column: 1 / -1;
      }

      .mini-menu {
        grid-column: 1 / -1;
        justify-self: stretch;
      }

      .mini-menu button {
        flex: 1;
      }

      .hero {
        padding: 38px 24px 34px;
      }

      .subject-grid {
        grid-template-columns: 1fr;
        padding: 24px;
      }

      .subject-card {
        min-height: 230px;
      }

      .site-frame {
        height: 78vh;
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <div class="browser-window">
      <header class="browser-top">
        <div class="window-dots" aria-hidden="true">
          <span class="window-dot"></span>
          <span class="window-dot"></span>
          <span class="window-dot"></span>
        </div>
        <button class="home-link" type="button" id="homeButton">Kezdőlap</button>
        <label class="search-wrap" aria-label="Keresés">
          <input class="search-input" id="searchInput" type="search" placeholder="Keresés">
        </label>
        <nav class="mini-menu" aria-label="Tételtárak">
          <button type="button" data-page="magyar" style="--tone:#2d8f83">Magyar</button>
          <button type="button" data-page="foldrajz" style="--tone:#2d77a8">Földrajz</button>
          <button type="button" data-page="tortenelem" style="--tone:#9d4b3e">Történelem</button>
        </nav>
        <div class="active-badge" id="activeBadge">Válassz tételtárat</div>
      </header>

      <main>
        <section class="landing" id="landing" aria-labelledby="landingTitle">
          <div class="hero">
            <h1 id="landingTitle">Érettségi tételtárak</h1>
            <p>Magyar, földrajz és történelem egy rendezett, gyorsan böngészhető tanulási felületen.</p>
          </div>

          <div class="subject-grid" aria-label="Tantárgy választás">
            <button class="subject-card" type="button" data-page="magyar" data-search="magyar irodalom nyelvtan" style="--tone:#2d8f83;--wash:#e2f3f0">
              <div class="subject-art" aria-hidden="true">
                <svg class="subject-icon" viewBox="0 0 64 64">
                  <path d="M9 14c8 0 15 2 21 7v32c-6-5-13-7-21-7V14Z" fill="none"></path>
                  <path d="M55 14c-8 0-15 2-21 7v32c6-5 13-7 21-7V14Z" fill="none"></path>
                  <path d="M16 22c4 .3 7 1.1 10 3M16 30c4 .3 7 1.1 10 3M38 25c3-1.6 6-2.5 10-3M38 33c3-1.6 6-2.5 10-3"></path>
                </svg>
                <svg class="subject-icon" viewBox="0 0 64 64">
                  <path d="M17 10h25c5 0 8 3 8 8v1H30c-5 0-8 3-8 8v27h-5V10Z" fill="none"></path>
                  <path d="M30 19v34h24M30 28h16M30 37h13"></path>
                </svg>
              </div>
              <strong>Magyar</strong>
              <p>Irodalmi és nyelvtani témák gyors böngészéshez, felelés előtti ismétléshez.</p>
              <span class="open-pill">Megnyitás</span>
            </button>

            <button class="subject-card" type="button" data-page="foldrajz" data-search="foldrajz földrajz természet társadalom térkép" style="--tone:#2d77a8;--wash:#e5f1fb">
              <div class="subject-art" aria-hidden="true">
                <svg class="subject-icon" viewBox="0 0 64 64">
                  <circle cx="29" cy="27" r="18" fill="none"></circle>
                  <path d="M17 18c6 1 8 4 8 8 0 3 5 3 7 6 2 3-1 7 2 10M36 12c-2 4 2 5 5 7 4 3 1 8 6 10M29 45v9M19 54h20"></path>
                </svg>
                <svg class="subject-icon" viewBox="0 0 64 64">
                  <path d="M8 17l15-6 18 6 15-6v36l-15 6-18-6-15 6V17Z" fill="none"></path>
                  <path d="M23 11v36M41 17v36M14 25c5 1 8 3 11 7M34 25c-4 2-6 5-7 9M47 22c3 2 4 5 3 8"></path>
                </svg>
              </div>
              <strong>Földrajz</strong>
              <p>Átlátható földrajzi tételgyűjtemény természet- és társadalomföldrajzi témákkal.</p>
              <span class="open-pill">Megnyitás</span>
            </button>

            <button class="subject-card" type="button" data-page="tortenelem" data-search="tortenelem történelem korszak esemény fogalom" style="--tone:#9d4b3e;--wash:#f4e8e3">
              <div class="subject-art" aria-hidden="true">
                <svg class="subject-icon" viewBox="0 0 64 64">
                  <path d="M12 52h40M16 46h32M20 24h24M16 20l16-9 16 9H16Z" fill="none"></path>
                  <path d="M21 24v22M31 24v22M43 24v22M32 8v-4M32 4h8"></path>
                </svg>
                <svg class="subject-icon" viewBox="0 0 64 64">
                  <circle cx="32" cy="21" r="10" fill="none"></circle>
                  <path d="M17 54c2-12 8-18 15-18s13 6 15 18M24 18c4-6 12-6 16 0M22 30c4 4 16 4 20 0"></path>
                </svg>
              </div>
              <strong>Történelem</strong>
              <p>Korszakok, személyek, események és fogalmak egy külön tételtárban.</p>
              <span class="open-pill">Megnyitás</span>
            </button>

            <div class="empty-state" id="emptyState">Nincs találat erre a keresésre.</div>
          </div>
        </section>

        <section class="frame-wrap" aria-labelledby="currentTitle">
          <h1 class="frame-title" id="currentTitle">Tételtár</h1>
          <iframe class="site-frame" id="siteFrame" title="Tételtár"></iframe>
        </section>
      </main>
    </div>
  </div>

  <script>
    const pages = {
      magyar: {
        title: "Magyar tételtár",
        src: "pages/magyar.html"
      },
      foldrajz: {
        title: "Földrajz tételtár",
        src: "pages/foldrajz.html"
      },
      tortenelem: {
        title: "Történelem tételtár",
        src: "pages/tortenelem.html"
      }
    };

    const appShell = document.querySelector("#appShell");
    const frame = document.querySelector("#siteFrame");
    const title = document.querySelector("#currentTitle");
    const activeBadge = document.querySelector("#activeBadge");
    const buttons = [...document.querySelectorAll("[data-page]")];
    const cards = [...document.querySelectorAll(".subject-card")];
    const homeButton = document.querySelector("#homeButton");
    const searchInput = document.querySelector("#searchInput");
    const emptyState = document.querySelector("#emptyState");

    function showLanding(updateHash = true) {
      appShell.classList.remove("is-viewing");
      activeBadge.textContent = "Válassz tételtárat";
      title.textContent = "Tételtár";
      frame.removeAttribute("src");
      buttons.forEach((button) => button.setAttribute("aria-current", "false"));

      if (updateHash && window.location.hash) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    }

    function selectPage(pageKey, updateHash = true) {
      const page = pages[pageKey];

      if (!page) {
        showLanding(updateHash);
        return;
      }

      appShell.classList.add("is-viewing");
      frame.src = page.src;
      frame.title = page.title;
      title.textContent = page.title;
      activeBadge.textContent = page.title;

      buttons.forEach((button) => {
        const isActive = button.dataset.page === pageKey;
        button.setAttribute("aria-current", isActive ? "page" : "false");
      });

      if (updateHash && window.location.hash.slice(1) !== pageKey) {
        history.replaceState(null, "", `#${pageKey}`);
      }
    }

    function filterCards() {
      const query = searchInput.value.trim().toLocaleLowerCase("hu-HU");
      let visibleCount = 0;

      cards.forEach((card) => {
        const haystack = `${card.textContent} ${card.dataset.search}`.toLocaleLowerCase("hu-HU");
        const isVisible = !query || haystack.includes(query);
        card.hidden = !isVisible;
        visibleCount += isVisible ? 1 : 0;
      });

      emptyState.style.display = visibleCount ? "none" : "block";
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => selectPage(button.dataset.page));
    });

    homeButton.addEventListener("click", () => showLanding());
    searchInput.addEventListener("input", filterCards);

    window.addEventListener("hashchange", () => {
      selectPage(window.location.hash.slice(1), false);
    });

    selectPage(window.location.hash.slice(1), false);
  </script>
</body>
</html>
