<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Érettségi tételtárak</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e1ec;
      --surface: #ffffff;
      --surface-2: #f4f0e8;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --shadow: 0 22px 58px rgba(38, 44, 67, 0.16);
      --soft-shadow: 0 12px 28px rgba(38, 44, 67, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.11), transparent 34%),
        linear-gradient(315deg, rgba(163, 60, 87, 0.13), transparent 32%),
        var(--surface-2);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      gap: 18px;
      padding: 18px clamp(14px, 4vw, 42px) 20px;
      border-bottom: 1px solid rgba(217, 225, 236, 0.82);
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.92)),
        repeating-linear-gradient(90deg, rgba(15, 118, 110, 0.05) 0 1px, transparent 1px 48px);
      box-shadow: 0 10px 34px rgba(38, 44, 67, 0.08);
      backdrop-filter: blur(18px);
    }

    .brand-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 2px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand strong {
      overflow-wrap: anywhere;
      font-size: clamp(1.55rem, 4vw, 3.25rem);
      font-weight: 850;
      letter-spacing: 0;
      line-height: 0.98;
    }

    .brand span {
      color: var(--muted);
      font-size: clamp(0.95rem, 1.5vw, 1.08rem);
      line-height: 1.45;
      margin-top: 6px;
      max-width: 58ch;
    }

    .active-badge {
      align-items: center;
      background: #182236;
      border-radius: 8px;
      box-shadow: var(--soft-shadow);
      color: #ffffff;
      display: flex;
      flex: 0 0 auto;
      font-size: 0.92rem;
      font-weight: 750;
      gap: 10px;
      min-height: 42px;
      padding: 10px 14px;
    }

    .active-badge::before {
      background: var(--accent);
      border-radius: 999px;
      content: "";
      display: block;
      height: 10px;
      width: 10px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .menu-button {
      --tone: var(--accent);
      align-items: center;
      appearance: none;
      display: grid;
      gap: 5px;
      grid-template-columns: 10px 1fr;
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.9)),
        var(--surface);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-weight: 820;
      line-height: 1.15;
      padding: 13px 14px;
      text-align: left;
      transition: transform 150ms ease, background 150ms ease, border-color 150ms ease, box-shadow 150ms ease, color 150ms ease;
    }

    .menu-button::before {
      align-self: stretch;
      background: var(--tone);
      border-radius: 999px;
      content: "";
      display: block;
      min-height: 44px;
    }

    .menu-button small {
      color: var(--muted);
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.35;
      margin-top: 4px;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      border-color: var(--tone);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15), var(--soft-shadow);
      outline: none;
      transform: translateY(-1px);
    }

    .menu-button[aria-current="page"] {
      border-color: var(--tone);
      background: linear-gradient(135deg, var(--tone), #182236);
      color: var(--accent-ink);
      box-shadow: var(--shadow);
    }

    .menu-button[aria-current="page"] small {
      color: rgba(255, 255, 255, 0.78);
    }

    .frame-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      padding: clamp(10px, 2vw, 22px) clamp(10px, 4vw, 42px) clamp(18px, 3vw, 34px);
    }

    .frame-shell {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(217, 225, 236, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 8px;
    }

    .frame-topbar {
      align-items: center;
      border-bottom: 1px solid rgba(217, 225, 236, 0.9);
      display: flex;
      gap: 8px;
      min-height: 36px;
      padding: 0 8px 8px;
    }

    .dot {
      border-radius: 999px;
      display: block;
      height: 10px;
      width: 10px;
    }

    .dot:nth-child(1) {
      background: #a33c57;
    }

    .dot:nth-child(2) {
      background: #b36b16;
    }

    .dot:nth-child(3) {
      background: #0f766e;
    }

    .site-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 258px);
      min-height: 520px;
      border: 0;
      border-radius: 6px;
      background: #ffffff;
    }

    .frame-title {
      position: absolute;
      left: -999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (max-width: 720px) {
      .app-header {
        position: static;
      }

      .brand-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .active-badge {
        width: 100%;
      }

      .menu {
        grid-template-columns: 1fr;
      }

      .site-frame {
        height: 74vh;
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand-row">
      <div class="brand">
        <div class="eyebrow">Középszintű szóbeli</div>
        <strong>Érettségi tételtárak</strong>
        <span>Magyar, földrajz és történelem egy rendezett, gyorsan böngészhető tanulási felületen.</span>
      </div>
      <div class="active-badge" id="activeBadge">Magyar tételtár</div>
    </div>
    <nav class="menu" aria-label="Tételtárak">
      <button class="menu-button" type="button" data-page="magyar" style="--tone:#0f766e">
        <span>Magyar<small>Irodalom és nyelvtan tételek</small></span>
      </button>
      <button class="menu-button" type="button" data-page="foldrajz" style="--tone:#2563eb">
        <span>Földrajz<small>Természet- és társadalomföldrajz</small></span>
      </button>
      <button class="menu-button" type="button" data-page="tortenelem" style="--tone:#a33c57">
        <span>Történelem<small>Korszakok, események, fogalmak</small></span>
      </button>
    </nav>
  </header>

  <main class="frame-wrap">
    <h1 class="frame-title" id="currentTitle">Magyar tételtár</h1>
    <div class="frame-shell">
      <div class="frame-topbar" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <iframe class="site-frame" id="siteFrame" title="Magyar tételtár" src="pages/magyar.html"></iframe>
    </div>
  </main>

  <script>
    const pages = {
      magyar: {
        title: "Magyar tételtár",
        src: "pages/magyar.html"
      },
      foldrajz: {
        title: "Földrajz tételtár",
        src: "pages/foldrajz.html"
      },
      tortenelem: {
        title: "Történelem tételtár",
        src: "pages/tortenelem.html"
      }
    };

    const frame = document.querySelector("#siteFrame");
    const title = document.querySelector("#currentTitle");
    const activeBadge = document.querySelector("#activeBadge");
    const buttons = [...document.querySelectorAll("[data-page]")];

    function selectPage(pageKey, updateHash = true) {
      const normalizedKey = pages[pageKey] ? pageKey : "magyar";
      const page = pages[normalizedKey];
      frame.src = page.src;
      frame.title = page.title;
      title.textContent = page.title;
      activeBadge.textContent = page.title;

      buttons.forEach((button) => {
        const isActive = button.dataset.page === normalizedKey;
        button.setAttribute("aria-current", isActive ? "page" : "false");
      });

      if (updateHash && window.location.hash.slice(1) !== normalizedKey) {
        history.replaceState(null, "", `#${normalizedKey}`);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => selectPage(button.dataset.page));
    });

    window.addEventListener("hashchange", () => {
      selectPage(window.location.hash.slice(1), false);
    });

    selectPage(window.location.hash.slice(1) || "magyar", false);
  </script>
</body>
</html>
