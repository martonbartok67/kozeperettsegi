<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Érettségi tételtárak</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14213d;
      --muted: #5f6f89;
      --line: #dbe3ef;
      --surface: #ffffff;
      --surface-2: #f5f7fb;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --shadow: 0 18px 44px rgba(20, 33, 61, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--surface-2);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      gap: 12px;
      padding: 14px clamp(14px, 3vw, 28px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset;
      backdrop-filter: blur(14px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 2px;
    }

    .brand strong {
      overflow-wrap: anywhere;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .menu-button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      line-height: 1.15;
      padding: 10px 12px;
      transition: background 150ms ease, border-color 150ms ease, box-shadow 150ms ease, color 150ms ease;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      border-color: #9fb2cc;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
      outline: none;
    }

    .menu-button[aria-current="page"] {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
      box-shadow: var(--shadow);
    }

    .frame-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      padding: clamp(8px, 1.6vw, 16px);
    }

    .site-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 132px);
      min-height: 520px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .frame-title {
      position: absolute;
      left: -999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (max-width: 720px) {
      .app-header {
        position: static;
      }

      .brand-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .menu {
        grid-template-columns: 1fr;
      }

      .site-frame {
        height: 78vh;
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand-row">
      <div class="brand">
        <strong>Érettségi tételtárak</strong>
        <span>Válassz tantárgyat a menüről.</span>
      </div>
    </div>
    <nav class="menu" aria-label="Teteltarak">
      <button class="menu-button" type="button" data-page="magyar">Magyar</button>
      <button class="menu-button" type="button" data-page="foldrajz">Földrajz</button>
      <button class="menu-button" type="button" data-page="tortenelem">Történelem</button>
    </nav>
  </header>

  <main class="frame-wrap">
    <h1 class="frame-title" id="currentTitle">Magyar tételtár</h1>
    <iframe class="site-frame" id="siteFrame" title="Magyar tételtár" src="pages/magyar.html"></iframe>
  </main>

  <script>
    const pages = {
      magyar: {
        title: "Magyar tételtár",
        src: "pages/magyar.html"
      },
      foldrajz: {
        title: "Földrajz tételtár",
        src: "pages/foldrajz.html"
      },
      tortenelem: {
        title: "Történelem tételtár",
        src: "pages/tortenelem.html"
      }
    };

    const frame = document.querySelector("#siteFrame");
    const title = document.querySelector("#currentTitle");
    const buttons = [...document.querySelectorAll("[data-page]")];

    function selectPage(pageKey, updateHash = true) {
      const page = pages[pageKey] || pages.magyar;
      frame.src = page.src;
      frame.title = page.title;
      title.textContent = page.title;

      buttons.forEach((button) => {
        const isActive = button.dataset.page === pageKey;
        button.setAttribute("aria-current", isActive ? "page" : "false");
      });

      if (updateHash && window.location.hash.slice(1) !== pageKey) {
        history.replaceState(null, "", `#${pageKey}`);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => selectPage(button.dataset.page));
    });

    window.addEventListener("hashchange", () => {
      selectPage(window.location.hash.slice(1), false);
    });

    selectPage(window.location.hash.slice(1) || "magyar", false);
  </script>
</body>
</html>
